<html>
    <head><title>Day4 HTML</title>
    <style>
        table,th,td{
            border-collapse: collapse;
            border:1px solid black;
            padding:5px;
            background-color: lightsteelblue;
        }
    </style
    </head>
    <body>
        <h1>Table</h1>
        <table border="1">
            <caption>Monthly savings</caption>
            <tr>
                <th>Month</th>
                <th>Savings</th>
            </tr>
            <tr>
                <td>January</td>
                <td>100 bucks</td>
            </tr>
            <tr>
                <td>February</td>
                <td>50 bucks</td>
            </tr>
        </table>
        <br><br>
        <table border="1">
  <thead>
    <tr>
      <th>Product</th><th>Price</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td>Laptop</td><td>$1000</td>
    </tr>
    <tr>
      <td>Mouse</td><td>$20</td>
    </tr>
  </tbody>
  <tfoot>
    <tr>
      <td>Total</td><td>$1020</td>
    </tr>
  </tfoot>
</table>
    </body>
</html>
